<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉcoleOS – Gestion des Paiements</title>
<style>
  /* ─── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  /* ─── Login Screen ──────────────────────────────────────── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
  }
  .login-card {
    background: #fff; border-radius: 12px; padding: 40px 48px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .login-card h1 { color: #1a5276; font-size: 1.6rem; margin-bottom: 4px; }
  .login-card p  { color: #718096; font-size: .85rem; margin-bottom: 28px; }
  .login-card label { display: block; font-size: .8rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; margin-top: 14px; }
  .login-card input {
    width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e0; border-radius: 7px;
    font-size: .9rem; outline: none; transition: border .2s;
  }
  .login-card input:focus { border-color: #2980b9; }
  .btn-primary {
    width: 100%; padding: 11px; background: #1a5276; color: #fff; border: none;
    border-radius: 7px; font-size: .95rem; font-weight: 600; cursor: pointer; margin-top: 22px;
    transition: background .2s;
  }
  .btn-primary:hover { background: #154360; }
  #login-error { color: #e53e3e; font-size: .82rem; margin-top: 10px; min-height: 18px; }

  /* ─── App Shell ─────────────────────────────────────────── */
  #app { display: none; flex-direction: row; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 280px; min-width: 260px; background: #1a5276; color: #fff;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid rgba(255,255,255,.15); }
  .sidebar-header h2 { font-size: 1.1rem; font-weight: 700; }
  .sidebar-header p  { font-size: .75rem; opacity: .7; margin-top: 2px; }
  .search-box { padding: 12px 14px; }
  .search-box input {
    width: 100%; padding: 8px 12px; border-radius: 20px; border: none;
    background: rgba(255,255,255,.15); color: #fff; font-size: .85rem; outline: none;
  }
  .search-box input::placeholder { color: rgba(255,255,255,.55); }
  .student-list { flex: 1; overflow-y: auto; }
  .student-item {
    padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.07);
    transition: background .15s; display: flex; align-items: center; gap: 10px;
  }
  .student-item:hover  { background: rgba(255,255,255,.1); }
  .student-item.active { background: rgba(255,255,255,.2); }
  .stu-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; flex-shrink: 0;
  }
  .stu-info { flex: 1; min-width: 0; }
  .stu-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stu-grade { font-size: .75rem; opacity: .65; }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-paid    { background: #48bb78; }
  .dot-partial { background: #f6ad55; }
  .dot-unpaid  { background: #fc8181; }
  .dot-none    { background: #a0aec0; }
  .sidebar-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.15); }
  .sidebar-footer button {
    background: rgba(255,255,255,.12); border: none; color: #fff; padding: 7px 14px;
    border-radius: 6px; cursor: pointer; font-size: .82rem; width: 100%; transition: background .2s;
  }
  .sidebar-footer button:hover { background: rgba(255,255,255,.22); }

  /* Main Content */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .top-bar {
    background: #fff; padding: 14px 24px; display: flex; align-items: center;
    border-bottom: 1px solid #e2e8f0; gap: 12px;
  }
  .top-bar h3 { font-size: 1rem; font-weight: 700; color: #1a5276; flex: 1; }
  .btn-sm {
    padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: .82rem;
    font-weight: 600; transition: all .2s; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-success { background: #276749; color: #fff; }
  .btn-success:hover { background: #22543d; }
  .btn-blue    { background: #2b6cb0; color: #fff; }
  .btn-blue:hover { background: #2c5282; }
  .btn-gray    { background: #e2e8f0; color: #4a5568; }
  .btn-gray:hover { background: #cbd5e0; }
  .btn-danger  { background: #e53e3e; color: #fff; }
  .btn-danger:hover { background: #c53030; }
  .btn-outline { background: transparent; border: 1.5px solid #cbd5e0; color: #4a5568; }
  .btn-outline:hover { background: #f7fafc; }

  /* Student Detail */
  #detail-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #a0aec0; gap: 12px;
  }
  .empty-state svg { opacity: .3; }
  .empty-state p { font-size: .95rem; }

  /* Student Header Card */
  .student-header-card {
    background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 18px;
    border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px;
  }
  .big-avatar {
    width: 56px; height: 56px; border-radius: 50%; background: #2980b9;
    display: flex; align-items: center; justify-content: center; color: #fff;
    font-size: 1.3rem; font-weight: 700; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-info h2 { font-size: 1.1rem; font-weight: 700; color: #1a202c; }
  .header-meta { display: flex; gap: 18px; margin-top: 6px; flex-wrap: wrap; }
  .meta-chip {
    font-size: .78rem; color: #718096; display: flex; align-items: center; gap: 4px;
  }
  .meta-chip strong { color: #2d3748; }
  .tuition-badge {
    padding: 6px 14px; border-radius: 20px; font-size: .82rem; font-weight: 700;
    background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8;
  }

  /* Tuition Setup */
  .tuition-setup-card {
    background: #fff7ed; border: 1px dashed #f6ad55; border-radius: 10px;
    padding: 16px 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 14px;
  }
  .tuition-setup-card p { font-size: .85rem; color: #7b341e; flex: 1; }
  .tuition-setup-card input {
    padding: 8px 12px; border: 1.5px solid #f6ad55; border-radius: 7px;
    font-size: .9rem; width: 140px; outline: none;
  }
  .tuition-setup-card input:focus { border-color: #ed8936; }

  /* Summary Cards */
  .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
  .summary-card {
    background: #fff; border-radius: 10px; padding: 16px 20px; border: 1px solid #e2e8f0;
  }
  .summary-card .label { font-size: .75rem; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .summary-card .value { font-size: 1.5rem; font-weight: 800; margin-top: 4px; }
  .summary-card .sub   { font-size: .78rem; color: #a0aec0; margin-top: 2px; }
  .val-blue  { color: #2b6cb0; }
  .val-green { color: #276749; }
  .val-red   { color: #c53030; }
  .val-gray  { color: #718096; }
  .badge-sold {
    display: inline-flex; align-items: center; gap: 5px;
    background: #f0fff4; color: #276749; border: 1px solid #9ae6b4;
    border-radius: 20px; padding: 4px 12px; font-size: .78rem; font-weight: 700; margin-top: 6px;
  }

  /* Payments Table */
  .table-card {
    background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 18px; overflow: hidden;
  }
  .table-card-header {
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #e2e8f0;
  }
  .table-card-header h4 { font-size: .9rem; font-weight: 700; color: #2d3748; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead th {
    padding: 10px 16px; background: #f7fafc; text-align: left; font-weight: 600;
    color: #718096; font-size: .78rem; text-transform: uppercase; letter-spacing: .4px;
    border-bottom: 1px solid #e2e8f0;
  }
  tbody td { padding: 11px 16px; border-bottom: 1px solid #edf2f7; color: #2d3748; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f7fafc; }
  .versement-badge {
    background: #ebf8ff; color: #2b6cb0; border-radius: 12px; padding: 3px 10px;
    font-size: .78rem; font-weight: 700; display: inline-block;
  }
  .empty-table { text-align: center; color: #a0aec0; padding: 30px 16px; font-size: .85rem; }
  .delete-btn {
    background: none; border: none; color: #fc8181; cursor: pointer; padding: 4px 6px;
    border-radius: 4px; transition: background .15s; font-size: 1rem;
  }
  .delete-btn:hover { background: #fff5f5; color: #c53030; }

  /* Add Payment Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
    align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 28px 32px; width: 460px;
    max-width: 95vw; box-shadow: 0 25px 60px rgba(0,0,0,.3);
  }
  .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; color: #1a202c; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: .8rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
  .form-group input, .form-group select {
    width: 100%; padding: 9px 12px; border: 1.5px solid #cbd5e0; border-radius: 7px;
    font-size: .88rem; outline: none; transition: border .2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: #2980b9; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* School Settings Modal */
  .modal-wide { width: 540px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; right: 28px; background: #1a202c; color: #fff;
    padding: 12px 22px; border-radius: 8px; font-size: .85rem; font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,.3); z-index: 2000;
    transform: translateY(20px); opacity: 0; transition: all .3s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 4px solid #48bb78; }
  .toast.error   { border-left: 4px solid #fc8181; }

  /* ─── Print Styles ─────────────────────────────────────── */
  @media print {
    body { background: #fff; }
    #login-screen, #app { display: none !important; }
    #print-area { display: block !important; }
  }
  #print-area { display: none; }

  .receipt-page { width: 190mm; margin: 0 auto; font-family: Arial, sans-serif; }
  .receipt-copy {
    border: 1.5px solid #333; padding: 12px 16px; margin-bottom: 8mm;
    page-break-inside: avoid;
  }
  .receipt-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .receipt-school-name { font-size: 13pt; font-weight: 900; text-transform: uppercase; }
  .receipt-school-motto { font-size: 8pt; color: #333; margin-top: 2px; }
  .receipt-contact { font-size: 8pt; color: #333; margin-top: 3px; }
  .receipt-title { text-align: right; }
  .receipt-title h2 { font-size: 11pt; font-weight: 700; }
  .receipt-title p  { font-size: 9pt; color: #333; }
  .receipt-divider { border-top: 1.5px solid #333; margin: 8px 0; }
  .receipt-body { font-size: 9pt; }
  .receipt-row { display: flex; margin-bottom: 6px; align-items: baseline; }
  .receipt-row .rl { width: 140px; font-weight: 600; flex-shrink: 0; }
  .receipt-row .rv { flex: 1; border-bottom: 1px dotted #555; min-height: 16px; padding-bottom: 1px; }
  .receipt-row .rv.bold { font-weight: 700; font-size: 10pt; }
  .receipt-two-col { display: flex; gap: 20px; margin-bottom: 6px; }
  .receipt-two-col .col { flex: 1; }
  .receipt-two-col .col .rl { font-weight: 600; margin-right: 4px; }
  .receipt-two-col .col .rv { border-bottom: 1px dotted #555; display: inline-block; min-width: 80px; }
  .receipt-footer { display: flex; justify-content: space-between; margin-top: 14px; font-size: 9pt; }
  .receipt-footer .sig { text-align: right; }
  .receipt-footer .sig p { font-style: italic; }
  .receipt-note { font-size: 7.5pt; color: #555; margin-top: 10px; font-style: italic; border-top: 1px solid #aaa; padding-top: 5px; }
  .cut-line { border: none; border-top: 1px dashed #aaa; margin: 0 0 8mm 0; }
</style>
</head>
<body>

<!-- ════════════ LOGIN SCREEN ════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>ÉcoleOS</h1>
    <p>Gestion des Paiements de Scolarité</p>
    <label>Code établissement</label>
    <input id="inp-code" type="text" placeholder="ex: ECOLE01" autocomplete="off">
    <label>Identifiant</label>
    <input id="inp-user" type="text" placeholder="admin" autocomplete="off">
    <label>Mot de passe</label>
    <input id="inp-pass" type="password" placeholder="••••••••">
    <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ════════════ MAIN APP ════════════ -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2 id="school-name-sidebar">ÉcoleOS</h2>
      <p id="school-year-sidebar">Paiements de Scolarité</p>
    </div>
    <div class="search-box">
      <input id="search-input" type="text" placeholder="🔍 Rechercher un élève…" oninput="filterStudents()">
    </div>
    <div class="student-list" id="student-list"></div>
    <div class="sidebar-footer">
      <button onclick="openSchoolSettings()">⚙ Paramètres établissement</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div class="top-bar">
      <h3 id="top-title">Sélectionnez un élève</h3>
      <button class="btn-sm btn-outline" onclick="openAddStudent()">+ Nouvel élève</button>
      <button class="btn-sm btn-blue" id="btn-add-payment" style="display:none" onclick="openAddPayment()">+ Ajouter un versement</button>
      <button class="btn-sm btn-success" id="btn-print-receipt" style="display:none" onclick="printLastReceipt()">🖨 Imprimer reçu</button>
      <button class="btn-sm btn-gray" onclick="doLogout()">Déconnexion</button>
    </div>
    <div id="detail-area">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p>Choisissez un élève dans la liste pour gérer ses paiements.</p>
      </div>
    </div>
  </div>
</div>

<!-- ════════════ ADD PAYMENT MODAL ════════════ -->
<div class="modal-overlay" id="modal-payment">
  <div class="modal">
    <h3>Enregistrer un versement</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Montant reçu (FCFA)</label>
        <input id="pay-amount" type="number" placeholder="ex: 30000" min="0">
      </div>
      <div class="form-group">
        <label>N° Versement</label>
        <input id="pay-versement" type="number" placeholder="ex: 1" min="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date du paiement</label>
        <input id="pay-date" type="date">
      </div>
      <div class="form-group">
        <label>Mode de paiement</label>
        <select id="pay-method">
          <option>Espèce</option>
          <option>Chèque</option>
          <option>Virement</option>
          <option>Mobile Money</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>N° de reçu</label>
      <input id="pay-receipt-no" type="number" placeholder="ex: 35" min="1">
    </div>
    <div class="form-group">
      <label>Notes (optionnel)</label>
      <input id="pay-notes" type="text" placeholder="Remarques éventuelles">
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-gray" onclick="closeModal('modal-payment')">Annuler</button>
      <button class="btn-sm btn-success" onclick="savePayment()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ════════════ ADD/EDIT STUDENT MODAL ════════════ -->
<div class="modal-overlay" id="modal-student">
  <div class="modal">
    <h3 id="modal-student-title">Ajouter un élève</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Nom complet</label>
        <input id="stu-name" type="text" placeholder="ex: SANFO Mamadou">
      </div>
      <div class="form-group">
        <label>Classe</label>
        <input id="stu-grade" type="text" placeholder="ex: 4e">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Matricule</label>
        <input id="stu-matricule" type="text" placeholder="ex: SV-48">
      </div>
      <div class="form-group">
        <label>N° ID</label>
        <input id="stu-nid" type="text" placeholder="ex: 75A">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Scolarité annuelle (FCFA)</label>
        <input id="stu-tuition" type="number" placeholder="ex: 95000" min="0">
      </div>
      <div class="form-group">
        <label>Parent / Tuteur</label>
        <input id="stu-parent" type="text" placeholder="ex: M. SANFO Ali">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-gray" onclick="closeModal('modal-student')">Annuler</button>
      <button class="btn-sm btn-blue" onclick="saveStudent()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ════════════ SCHOOL SETTINGS MODAL ════════════ -->
<div class="modal-overlay" id="modal-school">
  <div class="modal modal-wide">
    <h3>Paramètres de l'établissement</h3>
    <div class="form-group">
      <label>Nom de l'établissement</label>
      <input id="sc-name" type="text" placeholder="ex: COMPLEXE SCOLAIRE SOURCE DE VIE">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Devise / Motto</label>
        <input id="sc-motto" type="text" placeholder="ex: DISCIPLINE - ÉVEIL - RÉUSSITE">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input id="sc-phone" type="text" placeholder="ex: +226 78-62-06-57">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Adresse</label>
        <input id="sc-address" type="text" placeholder="ex: TANGHIN / Derrière les rails">
      </div>
      <div class="form-group">
        <label>Année scolaire</label>
        <input id="sc-year" type="text" placeholder="ex: 2025/2026">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-gray" onclick="closeModal('modal-school')">Annuler</button>
      <button class="btn-sm btn-blue" onclick="saveSchoolSettings()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- ════════════ PRINT AREA ════════════ -->
<div id="print-area"></div>

<!-- ════════════ TOAST ════════════ -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const API = "https://ecoleos.onrender.com";

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let state = {
  token: null,
  schoolId: null,
  school: null,
  students: [],
  payments: [],        // all payments for the school
  activeStudent: null,
  editingStudentId: null,
};

/* ══════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════ */
function fmt(n) {
  if (n == null || n === '') return '—';
  return Number(n).toLocaleString('fr-FR');
}
function amountInWords(n) {
  // Simple French number-to-words for common amounts
  n = Math.round(n);
  const units = ['','un','deux','trois','quatre','cinq','six','sept','huit','neuf',
    'dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
  const tens = ['','','vingt','trente','quarante','cinquante','soixante','soixante-dix','quatre-vingt','quatre-vingt-dix'];
  if (n === 0) return 'zéro';
  function below1000(x) {
    let s = '';
    if (x >= 100) { s += (x >= 200 ? units[Math.floor(x/100)]+' ' : '') + 'cent '; x %= 100; if (x === 0 && Math.floor(x/100) > 1) s = s.trimEnd() + 's '; }
    if (x >= 20) {
      const t = Math.floor(x/10); const u = x%10;
      if (t === 7 || t === 9) s += tens[t-1] + '-' + units[10+u] + ' ';
      else { s += tens[t]; if (u === 1 && t !== 8) s += '-et'; if (u) s += '-' + units[u]; s += ' '; }
    } else if (x > 0) s += units[x] + ' ';
    return s;
  }
  let s = '';
  if (n >= 1000000) { s += below1000(Math.floor(n/1000000)) + 'million '; n %= 1000000; }
  if (n >= 1000)    { const k = Math.floor(n/1000); s += (k > 1 ? below1000(k) : '') + 'mille '; n %= 1000; }
  s += below1000(n);
  return s.trim() + ' francs CFA';
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3200);
}

async function apiFetch(path, opts={}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (res.status === 401) { doLogout(); throw new Error('Session expirée'); }
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `Erreur ${res.status}`);
  return body;
}

/* ══════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════ */
async function doLogin() {
  const code = document.getElementById('inp-code').value.trim();
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!code || !user || !pass) { errEl.textContent = 'Tous les champs sont requis.'; return; }
  try {
    const data = await apiFetch('/api/auth/login', { method:'POST', body: JSON.stringify({ schoolCode: code, username: user, password: pass }) });
    state.token    = data.token;
    state.schoolId = data.user.schoolId;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    await loadSchool();
    await loadStudents();
    await loadAllPayments();
  } catch(e) {
    errEl.textContent = e.message;
  }
}
function doLogout() {
  state = { token: null, schoolId: null, school: null, students: [], payments: [], activeStudent: null, editingStudentId: null };
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pass').value = '';
}
document.getElementById('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

/* ══════════════════════════════════════════════════════════
   DATA LOADING
══════════════════════════════════════════════════════════ */
async function loadSchool() {
  try {
    const data = await apiFetch(`/api/schools/${state.schoolId}`);
    state.school = data.data;
    document.getElementById('school-name-sidebar').textContent = state.school.name || 'ÉcoleOS';
    document.getElementById('school-year-sidebar').textContent = state.school.academicYear || 'Paiements de Scolarité';
  } catch(e) { /* non-blocking */ }
}

async function loadStudents() {
  const data = await apiFetch(`/api/schools/${state.schoolId}/students`);
  state.students = (data.data || []).filter(s => !s.deletedAt && s.status !== 'inactif');
  renderSidebar();
}

async function loadAllPayments() {
  try {
    const data = await apiFetch(`/api/schools/${state.schoolId}/tuition-payments`);
    state.payments = (data.data || []).filter(p => !p.deletedAt);
    // Refresh current student detail if open
    if (state.activeStudent) renderDetail(state.activeStudent._id);
    renderSidebar();
  } catch(e) { state.payments = []; }
}

function paymentsFor(studentId) {
  return state.payments.filter(p => p.studentId === studentId);
}
function totalPaid(studentId) {
  return paymentsFor(studentId).reduce((s, p) => s + (p.amount || 0), 0);
}
function remaining(student) {
  const t = student.tuition || 0;
  return Math.max(0, t - totalPaid(student._id));
}
function paymentStatus(student) {
  if (!student.tuition) return 'none';
  const paid = totalPaid(student._id);
  if (paid >= student.tuition) return 'paid';
  if (paid > 0) return 'partial';
  return 'unpaid';
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════════ */
function filterStudents() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderSidebar(q);
}

function renderSidebar(q='') {
  const list = document.getElementById('student-list');
  let students = state.students;
  if (q) students = students.filter(s => s.name.toLowerCase().includes(q) || (s.grade||'').toLowerCase().includes(q) || (s.matricule||'').toLowerCase().includes(q));
  if (students.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;opacity:.5;font-size:.82rem">${q ? 'Aucun résultat' : 'Aucun élève enregistré'}</div>`;
    return;
  }
  const dotClass = { paid:'dot-paid', partial:'dot-partial', unpaid:'dot-unpaid', none:'dot-none' };
  list.innerHTML = students.map(s => {
    const initials = s.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const st = paymentStatus(s);
    const active = state.activeStudent && state.activeStudent._id === s._id;
    return `<div class="student-item${active?' active':''}" onclick="selectStudent('${s._id}')">
      <div class="stu-avatar">${initials}</div>
      <div class="stu-info">
        <div class="stu-name">${s.name}</div>
        <div class="stu-grade">${s.grade||'—'} · Sc. ${s.tuition ? fmt(s.tuition)+' F' : 'non défini'}</div>
      </div>
      <div class="status-dot ${dotClass[st]}"></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════════
   DETAIL PANEL
══════════════════════════════════════════════════════════ */
function selectStudent(id) {
  state.activeStudent = state.students.find(s => s._id === id) || null;
  renderSidebar(document.getElementById('search-input').value.toLowerCase());
  renderDetail(id);
}

function renderDetail(id) {
  const s = state.students.find(x => x._id === id);
  if (!s) return;
  const payments = paymentsFor(id).sort((a,b) => (a.installmentNumber||0)-(b.installmentNumber||0));
  const paid = totalPaid(id);
  const rem  = s.tuition ? Math.max(0, s.tuition - paid) : null;
  const pct  = s.tuition ? Math.round(paid / s.tuition * 100) : 0;

  document.getElementById('top-title').textContent = s.name;
  document.getElementById('btn-add-payment').style.display = '';
  document.getElementById('btn-print-receipt').style.display = s.tuition ? '' : 'none';

  const initials = s.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  // Tuition setup warning if not set
  const tuitionSetup = !s.tuition ? `
    <div class="tuition-setup-card">
      <p>⚠ Aucun montant de scolarité défini pour cet élève. Entrez le montant annuel pour commencer le suivi.</p>
      <input type="number" id="quick-tuition" placeholder="Montant…" onkeydown="if(event.key==='Enter')quickSetTuition('${s._id}')">
      <button class="btn-sm btn-blue" onclick="quickSetTuition('${s._id}')">Définir</button>
    </div>` : '';

  // Summary cards
  const paidCard = `<div class="summary-card">
    <div class="label">Total reçu</div>
    <div class="value val-green">${fmt(paid)} <span style="font-size:.7em;font-weight:500">FCFA</span></div>
    <div class="sub">${pct}% de la scolarité</div>
  </div>`;
  const remCard = s.tuition ? `<div class="summary-card">
    <div class="label">Reste à payer</div>
    <div class="value ${rem===0?'val-green':'val-red'}">${fmt(rem)} <span style="font-size:.7em;font-weight:500">FCFA</span></div>
    ${rem===0 ? '<div class="badge-sold">✔ Frais Scolarité soldés</div>' : `<div class="sub">Sur ${fmt(s.tuition)} FCFA</div>`}
  </div>` : `<div class="summary-card"><div class="label">Reste à payer</div><div class="value val-gray">—</div><div class="sub">Scolarité non définie</div></div>`;
  const vCard = `<div class="summary-card">
    <div class="label">Versements</div>
    <div class="value val-blue">${payments.length}</div>
    <div class="sub">${payments.length === 0 ? 'Aucun paiement' : `Dernier: ${fmtDate(payments[payments.length-1]?.date)}`}</div>
  </div>`;

  // Table rows
  const rows = payments.length === 0
    ? `<tr><td colspan="6" class="empty-table">Aucun versement enregistré</td></tr>`
    : payments.map(p => `<tr>
        <td><span class="versement-badge">Versement ${p.installmentNumber || '—'}</span></td>
        <td><strong>${fmt(p.amount)} FCFA</strong></td>
        <td>${fmtDate(p.date)}</td>
        <td>${p.paymentMethod || 'Espèce'}</td>
        <td>${p.receiptNumber ? 'N°'+p.receiptNumber : '—'}</td>
        <td><button class="delete-btn" onclick="deletePayment('${p._id}')" title="Supprimer">🗑</button></td>
      </tr>`).join('');

  document.getElementById('detail-area').innerHTML = `
    <div class="student-header-card">
      <div class="big-avatar">${initials}</div>
      <div class="header-info">
        <h2>${s.name}</h2>
        <div class="header-meta">
          <div class="meta-chip">Classe: <strong>${s.grade||'—'}</strong></div>
          ${s.matricule ? `<div class="meta-chip">Matricule: <strong>${s.matricule}</strong></div>` : ''}
          ${s.nId ? `<div class="meta-chip">N° ID: <strong>${s.nId}</strong></div>` : ''}
          ${s.parent ? `<div class="meta-chip">Parent: <strong>${s.parent}</strong></div>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        ${s.tuition ? `<div class="tuition-badge">Scolarité: ${fmt(s.tuition)} FCFA</div>` : ''}
        <button class="btn-sm btn-outline" onclick="openEditStudent('${s._id}')">✏ Modifier</button>
      </div>
    </div>
    ${tuitionSetup}
    <div class="summary-row">${paidCard}${remCard}${vCard}</div>
    <div class="table-card">
      <div class="table-card-header">
        <h4>Historique des versements</h4>
        <button class="btn-sm btn-blue" onclick="openAddPayment()">+ Versement</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Versement</th><th>Montant</th><th>Date</th><th>Mode</th><th>Reçu</th><th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function quickSetTuition(studentId) {
  const val = parseFloat(document.getElementById('quick-tuition').value);
  if (!val || val <= 0) { showToast('Montant invalide', 'error'); return; }
  try {
    await apiFetch(`/api/schools/${state.schoolId}/students/${studentId}`, {
      method: 'PUT', body: JSON.stringify({ tuition: val })
    });
    const s = state.students.find(x => x._id === studentId);
    if (s) s.tuition = val;
    renderDetail(studentId);
    renderSidebar();
    showToast('Scolarité mise à jour');
  } catch(e) { showToast(e.message, 'error'); }
}

/* ══════════════════════════════════════════════════════════
   PAYMENT CRUD
══════════════════════════════════════════════════════════ */
function openAddPayment() {
  if (!state.activeStudent) return;
  const existing = paymentsFor(state.activeStudent._id);
  document.getElementById('pay-amount').value = '';
  document.getElementById('pay-versement').value = existing.length + 1;
  document.getElementById('pay-date').value = todayISO();
  document.getElementById('pay-method').value = 'Espèce';
  document.getElementById('pay-receipt-no').value = '';
  document.getElementById('pay-notes').value = '';
  document.getElementById('modal-payment').classList.add('open');
}

async function savePayment() {
  const amount = parseFloat(document.getElementById('pay-amount').value);
  if (!amount || amount <= 0) { showToast('Montant invalide', 'error'); return; }
  const payload = {
    _id: uid(),
    studentId: state.activeStudent._id,
    installmentNumber: parseInt(document.getElementById('pay-versement').value) || 1,
    amount,
    date: document.getElementById('pay-date').value,
    paymentMethod: document.getElementById('pay-method').value,
    receiptNumber: parseInt(document.getElementById('pay-receipt-no').value) || null,
    notes: document.getElementById('pay-notes').value,
  };
  try {
    const data = await apiFetch(`/api/schools/${state.schoolId}/tuition-payments`, {
      method: 'POST', body: JSON.stringify(payload)
    });
    state.payments.push(data.data);
    closeModal('modal-payment');
    renderDetail(state.activeStudent._id);
    renderSidebar();
    showToast('Versement enregistré ✓');
  } catch(e) { showToast(e.message, 'error'); }
}

async function deletePayment(paymentId) {
  if (!confirm('Supprimer ce versement ?')) return;
  try {
    await apiFetch(`/api/schools/${state.schoolId}/tuition-payments/${paymentId}`, { method:'DELETE' });
    state.payments = state.payments.filter(p => p._id !== paymentId);
    renderDetail(state.activeStudent._id);
    renderSidebar();
    showToast('Versement supprimé');
  } catch(e) { showToast(e.message, 'error'); }
}

/* ══════════════════════════════════════════════════════════
   STUDENT CRUD
══════════════════════════════════════════════════════════ */
function openAddStudent() {
  state.editingStudentId = null;
  document.getElementById('modal-student-title').textContent = 'Ajouter un élève';
  ['stu-name','stu-grade','stu-matricule','stu-nid','stu-parent'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('stu-tuition').value = '';
  document.getElementById('modal-student').classList.add('open');
}
function openEditStudent(id) {
  const s = state.students.find(x => x._id === id);
  if (!s) return;
  state.editingStudentId = id;
  document.getElementById('modal-student-title').textContent = 'Modifier l\'élève';
  document.getElementById('stu-name').value      = s.name     || '';
  document.getElementById('stu-grade').value     = s.grade    || '';
  document.getElementById('stu-matricule').value = s.matricule|| '';
  document.getElementById('stu-nid').value       = s.nId      || '';
  document.getElementById('stu-tuition').value   = s.tuition  || '';
  document.getElementById('stu-parent').value    = s.parent   || '';
  document.getElementById('modal-student').classList.add('open');
}
async function saveStudent() {
  const name = document.getElementById('stu-name').value.trim();
  if (!name) { showToast('Le nom est requis', 'error'); return; }
  const payload = {
    name,
    grade:     document.getElementById('stu-grade').value.trim(),
    matricule: document.getElementById('stu-matricule').value.trim(),
    nId:       document.getElementById('stu-nid').value.trim(),
    tuition:   parseFloat(document.getElementById('stu-tuition').value) || null,
    parent:    document.getElementById('stu-parent').value.trim(),
  };
  try {
    if (state.editingStudentId) {
      const data = await apiFetch(`/api/schools/${state.schoolId}/students/${state.editingStudentId}`, {
        method:'PUT', body: JSON.stringify(payload)
      });
      const idx = state.students.findIndex(s => s._id === state.editingStudentId);
      if (idx >= 0) state.students[idx] = { ...state.students[idx], ...data.data };
      renderDetail(state.editingStudentId);
    } else {
      payload._id = uid();
      const data = await apiFetch(`/api/schools/${state.schoolId}/students`, {
        method:'POST', body: JSON.stringify(payload)
      });
      state.students.push(data.data);
    }
    closeModal('modal-student');
    renderSidebar();
    showToast('Élève enregistré ✓');
  } catch(e) { showToast(e.message, 'error'); }
}

/* ══════════════════════════════════════════════════════════
   SCHOOL SETTINGS
══════════════════════════════════════════════════════════ */
function openSchoolSettings() {
  const sc = state.school || {};
  document.getElementById('sc-name').value    = sc.name    || '';
  document.getElementById('sc-motto').value   = sc.motto   || '';
  document.getElementById('sc-phone').value   = sc.phone   || '';
  document.getElementById('sc-address').value = sc.address || '';
  document.getElementById('sc-year').value    = sc.academicYear || '';
  document.getElementById('modal-school').classList.add('open');
}
async function saveSchoolSettings() {
  const payload = {
    name:         document.getElementById('sc-name').value.trim(),
    motto:        document.getElementById('sc-motto').value.trim(),
    phone:        document.getElementById('sc-phone').value.trim(),
    address:      document.getElementById('sc-address').value.trim(),
    academicYear: document.getElementById('sc-year').value.trim(),
  };
  try {
    const data = await apiFetch(`/api/schools/${state.schoolId}`, { method:'PUT', body: JSON.stringify(payload) });
    state.school = { ...state.school, ...data.data };
    document.getElementById('school-name-sidebar').textContent = state.school.name || 'ÉcoleOS';
    document.getElementById('school-year-sidebar').textContent = state.school.academicYear || 'Paiements';
    closeModal('modal-school');
    showToast('Paramètres sauvegardés ✓');
  } catch(e) { showToast(e.message, 'error'); }
}

/* ══════════════════════════════════════════════════════════
   RECEIPT PRINTING
══════════════════════════════════════════════════════════ */
function printLastReceipt() {
  const s = state.activeStudent;
  if (!s) return;
  const payments = paymentsFor(s._id).sort((a,b) => (a.installmentNumber||0)-(b.installmentNumber||0));
  if (payments.length === 0) { showToast('Aucun versement à imprimer', 'error'); return; }
  const lastPayment = payments[payments.length - 1];
  printReceipt(s, lastPayment, payments);
}

function printReceipt(student, payment, allPayments) {
  const sc = state.school || {};
  const schoolName    = sc.name    || 'ÉcoleOS';
  const schoolMotto   = sc.motto   || '';
  const schoolPhone   = sc.phone   || '';
  const schoolAddress = sc.address || '';
  const academicYear  = sc.academicYear || new Date().getFullYear() + '/' + (new Date().getFullYear()+1);
  const location      = schoolAddress || sc.city || '';

  const paid = allPayments.reduce((s,p) => s+(p.amount||0), 0);
  const rem  = Math.max(0, (student.tuition||0) - paid);
  const receiptNo = payment.receiptNumber || '—';
  const amountWords = payment.amount ? amountInWords(payment.amount) : '';

  function copyHTML() { return `
    <div class="receipt-copy">
      <div class="receipt-header">
        <div>
          <div class="receipt-school-name">${schoolName}</div>
          ${schoolMotto  ? `<div class="receipt-school-motto">${schoolMotto}</div>` : ''}
          ${schoolPhone  ? `<div class="receipt-contact">Tél. : ${schoolPhone}</div>` : ''}
          ${schoolAddress? `<div class="receipt-contact">Sis à : ${schoolAddress}</div>` : ''}
        </div>
        <div class="receipt-title">
          <h2>Reçu de paiement N° ${receiptNo}</h2>
          <p>Année scolaire : ${academicYear}</p>
        </div>
      </div>
      <div class="receipt-divider"></div>
      <div class="receipt-body">
        <div class="receipt-row">
          <span class="rl">Reçu de :</span>
          <span class="rv bold">${student.name}</span>
        </div>
        <div class="receipt-row">
          <span class="rl">La somme de :</span>
          <span class="rv bold">${payment.amount ? fmt(payment.amount) + ' FCFA' : ''}</span>
        </div>
        <div class="receipt-row">
          <span class="rl">(en lettres)</span>
          <span class="rv">${amountWords}</span>
        </div>
        <div class="receipt-row">
          <span class="rl">Reste à payer (Scolarité) :</span>
          <span class="rv bold">${rem === 0 ? '0' : fmt(rem) + ' FCFA'}</span>
        </div>
        <div class="receipt-two-col">
          <div class="col"><span class="rl">Scolarité :</span> <span class="rv">${fmt(student.tuition)} FCFA</span></div>
          <div class="col"><span class="rl">Classe :</span> <span class="rv">${student.grade||'—'}</span></div>
        </div>
        <div class="receipt-two-col">
          <div class="col"><span class="rl">Montant Autre Frais :</span> <span class="rv">&nbsp;</span></div>
          <div class="col"><span class="rl">Montant total reçu :</span> <span class="rv bold">${fmt(paid)} FCFA</span></div>
        </div>
        <div class="receipt-row">
          <span class="rl">Mode de paiement :</span>
          <span class="rv">${payment.paymentMethod || 'Espèce'}</span>
        </div>
      </div>
      <div class="receipt-footer">
        <div>${location ? location + ' le ' : ''}${fmtDate(payment.date)}</div>
        <div class="sig">
          <p>signature et cachet</p>
          <br>
          <p><em>La Comptabilité</em></p>
        </div>
      </div>
      <div class="receipt-note">NB : Aucune somme versée n'est remboursable</div>
    </div>`;
  }

  const printArea = document.getElementById('print-area');
  printArea.innerHTML = `
    <div class="receipt-page">
      ${copyHTML()}
      <hr class="cut-line">
      ${copyHTML()}
    </div>`;

  window.print();
}

/* ══════════════════════════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════════════════════════ */
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
</script>
